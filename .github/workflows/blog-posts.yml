name: Latest Blog Post Workflow

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest posts from Hashnode GraphQL API
        run: |
          curl -s -X POST https://gql.hashnode.com/ \
            -H "Content-Type: application/json" \
            -d '{
              "query": "query { publication(host: \"blog.gagofure.com\") { posts(first: 5) { edges { node { title brief url publishedAt } } } } }"
            }' > response.json
          echo "API Response:"
          cat response.json

      - name: Update README with latest posts
        run: |
          python3 << 'EOF'
          import json
          import re
          from datetime import datetime

          with open('response.json') as f:
              data = json.load(f)

          posts = data.get('data', {}).get('publication', {}).get('posts', {}).get('edges', [])

          if not posts:
              print("No posts found or API error")
              print(json.dumps(data, indent=2))
              markdown_content = "_No blog posts yet — check back soon!_"
          else:
              lines = []
              for post in posts:
                  node = post['node']
                  title = node['title']
                  url = node['url']
                  date_str = node.get('publishedAt', '')
                  try:
                      date_obj = datetime.fromisoformat(date_str.replace('Z', '+00:00'))
                      formatted_date = date_obj.strftime('%b %d, %Y')
                      lines.append(f"- [{title}]({url}) — _{formatted_date}_")
                  except Exception:
                      lines.append(f"- [{title}]({url})")
              markdown_content = "\n".join(lines)

          with open('README.md', 'r') as f:
              readme = f.read()

          pattern = r'(<!-- BLOG-POST-LIST:START -->)(.*?)(<!-- BLOG-POST-LIST:END -->)'
          replacement = f'\\1\n{markdown_content}\n\\3'
          new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open('README.md', 'w') as f:
              f.write(new_readme)

          print("README updated successfully")
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update README with latest blog posts"
            git push
          fi
