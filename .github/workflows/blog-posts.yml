name: Latest Blog Post Workflow

on:
  schedule:
    # Runs every 6 hours (less aggressive to avoid rate limits)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest blog posts from Hashnode
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # Use Hashnode subdomain (more reliable than custom domain - avoids Cloudflare rate limits)
          feed_list: "https://gagofure.hashnode.dev/rss.xml"
          max_post_count: 5
          comment_tag_name: "BLOG-POST-LIST"
          # Retry on failure (helps with intermittent 429 errors)
          retry_count: 5
          retry_wait_time: 30
          # Custom user agent (some sites block default GitHub Actions UA)
          user_agent: "Mozilla/5.0 (compatible; BlogPostWorkflow/1.0; +https://github.com/gautamkrishnar/blog-post-workflow)"
